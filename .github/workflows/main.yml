name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "18"

    - name: Install dependencies
      run: |
        cd stockboard
        npm install

    - name: Run tests (Playwright)
      run: |
        cd stockboard
        npx playwright install
        npx playwright test || true

    - name: Build project
      run: |
        cd stockboard
        npm run build || true

# trigger
